<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">

<style>
.text {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 44px;
  font-weight: 500;
  letter-spacing: 1.5px;
  fill: #FFFFFF;
  opacity: 0;
  animation: fadeSlide 18s infinite;
}

.text:nth-child(1) { animation-delay: 0s; }
.text:nth-child(2) { animation-delay: 6s; }
.text:nth-child(3) { animation-delay: 12s; }

@keyframes fadeSlide {
  0% { opacity: 0; transform: translateX(50px); }
  10% { opacity: 1; transform: translateX(0px); }
  30% { opacity: 1; }
  40% { opacity: 0; }
  100% { opacity: 0; }
}
</style>

<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="text">
Aditya Pandey
</text>

<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="text">
UnderGrad @IIITU
</text>

<text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="text">
AI/ML Developer
</text>

</svg>
